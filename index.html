<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title>NavMe — Smart AR Navigation</title>
    <meta name="title" content="NavMe — Smart AR Navigation" />
    <meta name="description" content="Discover AR experiences near you. Zero install. Location-based AR discovery powered by real-time distance detection." />
    <meta name="keywords" content="AR navigation, augmented reality, location-based, PWA, NavMe" />
    <meta name="author" content="NavMe" />
    <meta name="robots" content="index, follow" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)" />

    <!-- PWA / Apple Mobile Meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NavMe" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-startup-image" href="/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://navme.space/" />
    <meta property="og:title" content="NavMe — Smart AR Navigation" />
    <meta property="og:description" content="Discover AR experiences near you. Zero install, location-based AR discovery." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NavMe — Smart AR Navigation" />
    <meta name="twitter:description" content="Discover AR experiences near you with smart location-based navigation." />

    <!-- Fonts: Inter + Cal Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Manifest (injected by vite-plugin-pwa) -->
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
