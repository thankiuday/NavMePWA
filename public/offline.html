<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NavMe — You're offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #6366f1;
      --accent: #8b5cf6;
      --bg: #0f0f13;
      --card: #18181f;
      --border: #27272f;
      --text: #f9fafb;
      --muted: #6b7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      max-width: 380px;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(99,102,241,.12), rgba(59,130,246,.12));
      border: 1px solid rgba(99,102,241,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pulse 2.5s ease-in-out infinite;
      overflow: hidden;
    }

    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,.2); }
      50%       { box-shadow: 0 0 0 16px rgba(99,102,241,.0); }
    }

    svg { color: var(--brand); }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--muted);
      font-size: 0.925rem;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 9999px;
      background: rgba(99,102,241,.12);
      border: 1px solid rgba(99,102,241,.25);
      color: #818cf8;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f87171;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0.7rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--brand);
      color: white;
      box-shadow: 0 0 20px rgba(99,102,241,.35);
    }

    .btn-primary:hover {
      background: #4f46e5;
      box-shadow: 0 0 30px rgba(99,102,241,.5);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: scale(0.97); }

    .cached-note {
      margin-top: 1.5rem;
      padding: 0.875rem 1.25rem;
      border-radius: 0.875rem;
      background: var(--card);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
    }

    .check { color: #34d399; flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">
      <span class="dot"></span>
      No Connection
    </div>

    <div class="icon-wrap">
      <img src="/logo.png" alt="NavMe" width="80" height="80" />
    </div>

    <h1>You're offline</h1>
    <p>
      NavMe needs an internet connection to discover AR experiences near you.
      Connect to Wi-Fi or mobile data and try again.
    </p>

    <button class="btn btn-primary" onclick="window.location.reload()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try Again
    </button>

    <div class="cached-note">
      <svg class="check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <span>
        Pages you've visited are cached locally — you may be able to browse them once the app reloads.
      </span>
    </div>
  </div>
</body>
</html>
